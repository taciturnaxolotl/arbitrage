name: Build RedRising

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: "latest"

      

      - name: Configure CMake
        working-directory: dropship/redrising
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: dropship/redrising
        run: cmake --build build --config Release --target RedRising

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: RedRising.exe
          path: dropship/redrising/build/src/Release/RedRising.exe

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build NSIS installer
        working-directory: dropship/redrising/installer/nsis
        run: |
          $env:Path = "C:\Program Files (x86)\NSIS;$env:Path"
          makensis redrising.nsi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: RedRisingSetup.exe
          path: dropship/redrising/installer/nsis/RedRisingSetup.exe
